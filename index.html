<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rol Music - Demo</title>
    <script>
      // Disable right-click
      document.addEventListener('contextmenu', event => event.preventDefault());

      // Disable usual inspection shortcuts
      document.onkeydown = function (e) {
        // F12
        if (e.key === "F12") {
          return false;
        }
        // Ctrl+Shift+I (Windows) or Cmd+Opt+I (Mac)
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === "I") {
          return false;
        }
        // Ctrl+Shift+J (Windows) or Cmd+Opt+J (Mac)
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === "J") {
          return false;
        }
        // Ctrl+U (Windows) or Cmd+Opt+U (Mac) - View Source
        if ((e.ctrlKey || e.metaKey) && e.key === "u") {
          return false;
        }
        // Ctrl+Shift+C (Windows) or Cmd+Opt+C (Mac) - Inspect Element
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === "C") {
          return false;
        }
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
